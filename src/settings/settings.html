<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src 'self' app: data:; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'" />
  <title>PokéFollower</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --red: #EF4036;
      --tab-h: 48px;
      --top-band: 34px; /* red band + black border */
    }

    html, body {
      margin: 0; padding: 0; height: 100%;
    }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      font-size: 14px;
      background: #fff;
      color: #000;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* ── Top red band ── */
    .top-band {
      flex: 0 0 auto;
      height: 28px;
      background: var(--red);
      border-bottom: 6px solid #000;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Pokéball notch */
    .notch {
      width: 27px; height: 27px;
      background: #fff;
      border: 10px solid #000; border-radius: 50%;
      box-sizing: content-box;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -30%);
    }
    .notch::after {
      content: ""; position: absolute;
      width: 20px; height: 21px;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      background: #fff; border: 1px solid #000; border-radius: 50%;
    }

    /* ── Main content area (scrollable, sits between top band and tab bar) ── */
    .panels-wrap {
      flex: 1 1 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Panels ── */
    .panel {
      flex: 1 1 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 10px 0 6px;
      gap: 8px;
    }
    .panel[hidden] { display: none !important; }

    /* ── Bottom tab bar ── */
    #tabs {
      flex: 0 0 var(--tab-h);
      display: flex;
      background: var(--red);
      border-top: 5px solid #000;
      position: relative;
      z-index: 10;
    }
    .tab {
      flex: 1 1 0;
      border: none;
      background: transparent;
      color: #fff;
      font: inherit;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .04em;
      cursor: pointer;
      padding: 0;
      opacity: 0.7;
      transition: opacity .1s, background .1s;
      position: relative;
    }
    .tab:hover { opacity: 0.9; }
    .tab.active {
      opacity: 1;
      background: rgba(0,0,0,.18);
    }
    .tab.active::after {
      content: "";
      position: absolute;
      top: 0; left: 8px; right: 8px;
      height: 3px;
      background: #fff;
      border-radius: 0 0 3px 3px;
    }

    /* ── Accessibility ── */
    .sr-only {
      position: absolute !important; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,1px,1px); white-space: nowrap; border: 0;
    }

    /* ═══════════════════════════════════════════
       あいぼうパネル
    ═══════════════════════════════════════════ */

    /* Hero section */
    .hero-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 8px 14px 0;
      flex: 1 1 auto;            /* 縦の余白を吸収して下まで埋める */
      justify-content: center;
      min-height: 0;
    }
    .hero-sprite-wrap {
      flex: 0 0 auto;
      width: 100%;
      max-width: 200px;
      height: 180px;
      background: #fafafa;
      border: 2px solid #000;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .nickname-input {
      font: inherit; font-size: 15px; font-weight: 700; text-align: center;
      width: 80%; max-width: 220px; padding: 2px 6px;
      border: 2px solid var(--red, #e8503a); border-radius: 6px; outline: none;
    }
    #heroSprite {
      image-rendering: pixelated;
    }
    .hero-info {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }
    #heroName {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: .03em;
      line-height: 1;
    }
    #heroNum {
      font-size: 12px;
      color: #888;
      font-weight: 700;
    }
    #heroTypes {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      justify-content: center;
    }
    /* type chip appearance (populated by settings.js) */
    #heroTypes .type-chip {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .04em;
      padding: 2px 8px;
      border-radius: 20px;
      border: 1.5px solid rgba(0,0,0,.25);
      color: #fff;
      text-transform: uppercase;
    }

    /* Nickname edit button */
    #nicknameEdit {
      border: 1.5px solid #000;
      background: #fff;
      font: inherit;
      font-size: 11px;
      font-weight: 800;
      padding: 3px 10px;
      cursor: pointer;
      box-shadow: 2px 2px 0 #000;
      margin-top: 2px;
    }
    #nicknameEdit:hover { background: #f5f5f5; }

    /* ── Sliders (大きさ / 距離 / 速さ) ── */
    .sliders-section {
      padding: 4px 14px 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .slider-row {
      display: grid;
      grid-template-columns: 3em 1fr auto;
      align-items: center;
      gap: 8px;
    }
    .slider-row label {
      font-size: 11px;
      font-weight: 800;
      text-align: right;
    }
    .slider-row input[type="number"] {
      width: 100%;
      border: 0;
      border-bottom: 2px solid #000;
      background: transparent;
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      text-align: center;
      outline: none;
      padding: 2px 0;
    }
    .slider-row input[type="number"]::-webkit-outer-spin-button,
    .slider-row input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .slider-row .readout {
      font-size: 11px;
      font-weight: 700;
      color: #555;
      min-width: 3em;
      text-align: left;
    }

    /* ── Party row ── */
    .party-row {
      display: flex;
      gap: 7px;
      padding: 9px 14px 4px;
      justify-content: center;
    }
    .party-slot {
      flex: 0 0 44px;
      height: 44px;
      border: 2px solid #000;
      border-radius: 8px;
      background: #fafafa;
      display: flex; align-items: center; justify-content: center;
      overflow: visible;
    }
    .party-slot img {
      width: 40px; height: 40px;
      object-fit: contain;
      border-radius: 6px;
    }
    /* フォルムは正規化でタイル一杯なので、手持ちでも見た目だけ少し縮小して馴染ませる */
    .party-slot[data-id*="/forms/"] img { transform: scale(0.8); transform-origin: center; }
    .party-slot { position: relative; cursor: pointer; font: inherit; }
    .party-slot.lead { border-color: var(--red); box-shadow: 0 0 0 2px var(--red) inset; }
    .party-slot.empty { color: #bbb; font-size: 22px; font-weight: 800; line-height: 1; }
    .party-slot .party-remove {
      position: absolute; top: -6px; right: -6px;
      width: 18px; height: 18px; line-height: 15px;
      border-radius: 50%; border: 1.5px solid #000;
      background: #fff; color: #000;
      font-size: 12px; font-weight: 900; text-align: center;
      z-index: 2;
    }
    .party-slot .party-remove:hover { background: var(--red); color: #fff; }
    .party-row.replacing { outline: 2px dashed var(--red); outline-offset: 2px; animation: party-blink 0.8s steps(2) infinite; }
    @keyframes party-blink { 50% { opacity: .55; } }
    .replace-hint { color: var(--red) !important; }

    /* ── Roam coming-soon pill ── */
    #roamSoon {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin: 4px 14px 0;
      padding: 4px 12px;
      border: 2px dashed #ccc;
      border-radius: 20px;
      background: #fafafa;
      color: #aaa;
      font-size: 11px;
      font-weight: 800;
      cursor: default;
      user-select: none;
      align-self: flex-start;
    }

    /* ── Section separator ── */
    .section-label {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .06em;
      color: #aaa;
      text-transform: uppercase;
      padding: 4px 14px 0;
    }

    /* ═══════════════════════════════════════════
       ボックスパネル
    ═══════════════════════════════════════════ */

    /* Search */
    .search-wrap {
      padding: 0 12px;
      flex: 0 0 auto;
    }
    .search-wrap input {
      width: 100%; box-sizing: border-box; padding: 7px 10px;
      border: 1.5px solid #000; border-radius: 8px;
      font-size: 13px; font-weight: 600; outline: none;
    }

    /* Kind select row */
    .kind-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 14px;
      font-size: 12px;
      font-weight: 700;
      flex: 0 0 auto;
    }
    .kind-row select {
      border: 1.5px solid #000;
      border-radius: 6px;
      background: #fff;
      color: #000;
      font: inherit;
      font-weight: 700;
      padding: 3px 6px;
    }

    /* Generation chips */
    .gen-chips {
      margin: 0 14px;
      display: flex;
      gap: 3px;
      flex: 0 0 auto;
    }
    .gen-chip {
      flex: 1 1 0; min-width: 0; padding: 3px 0;
      border: 1px solid #ccc; border-radius: 6px;
      font-size: 11px; font-weight: 700;
      background: #fff; color: #444;
      cursor: pointer; outline: none;
    }
    .gen-chip:hover { background: #f5f5f5; }
    .gen-chip.active { background: var(--red); color: #fff; border-color: var(--red); }

    /* Type chips */
    .type-chips {
      margin: 0 14px;
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      flex: 0 0 auto;
    }
    .type-chip-filter {
      padding: 3px 8px;
      border: 1.5px solid #ccc;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 800;
      background: #fff;
      color: #555;
      cursor: pointer;
      outline: none;
    }
    .type-chip-filter:hover { background: #f5f5f5; }
    .type-chip-filter.active {
      background: #333;
      color: #fff;
      border-color: #333;
    }

    /* Pokémon grid */
    .grid {
      margin: 0 12px;
      padding: 4px;
      flex: 1 1 280px;
      min-height: 160px;
      overflow-y: auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      align-content: start;
      border: 1.5px solid #000;
      border-radius: 8px;
      background: #fafafa;
    }
    .tile {
      display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
      gap: 2px; padding: 6px 2px;
      border: 2px solid transparent; border-radius: 8px;
      background: #fff; cursor: pointer; font: inherit; text-align: center;
      position: relative;
    }
    .tile:hover { background: #f0f0f0; }
    .tile.selected { border-color: var(--red); background: #fff4f3; }
    .tile.favorite::after {
      content: "★";
      position: absolute; top: 2px; right: 4px;
      color: var(--red); font-size: 10px; font-weight: 900;
    }
    .tile img { width: 56px; height: 56px; object-fit: contain; }
    /* フォルムはタイル一杯に正規化済み。通常種(実サイズ反映)と並べると大きすぎるので、
       枠は56pxのまま(レイアウト不変=名前/番号が揃う)見た目だけ縮小して馴染ませる */
    .tile[data-region]:not([data-region=""]) img { transform: scale(0.72); transform-origin: center; }
    .tile .name { font-size: 11px; font-weight: 700; line-height: 1.1; word-break: break-all; }
    .tile .num  { font-size: 10px; color: #888; }
    .tile.hidden { display: none; }

    /* ═══════════════════════════════════════════
       せっていパネル
    ═══════════════════════════════════════════ */

    /* Enable toggle row */
    .setting-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 700;
    }

    /* Pokéball toggle (preserved from original) */
    #enabled {
      appearance: none; -webkit-appearance: none;
      width: 36px; height: 18px;
      border: 1.5px solid #000; border-radius: 18px;
      background: #fff; position: relative;
      display: inline-block; cursor: pointer; outline: none;
      flex: 0 0 auto;
    }
    #enabled::after {
      content: "";
      position: absolute; top: 50%; left: -4px; transform: translateY(-50%);
      width: 18px; height: 18px; border-radius: 50%;
      border: 2px solid #000;
      background: linear-gradient(to bottom, var(--red) 50%, #fff 50%);
    }
    #enabled:checked { background: var(--red); }
    #enabled:checked::after { left: calc(100% - 18px); }

    /* Companion / Codex cards */
    .companion-card,
    .codex-card {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      margin: 0 12px;
      padding: 5px 8px;
      border: 2px solid #000;
      background: #fff;
      box-shadow: 2px 2px 0 #000;
      box-sizing: border-box;
      flex: 0 0 auto;
    }
    .companion-card label {
      display: inline-grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      font-weight: 800;
      min-width: 0;
    }
    .companion-card input[type="checkbox"] {
      width: 16px; height: 16px;
      accent-color: var(--red);
    }
    .companion-card button,
    .codex-card button {
      border: 2px solid #000;
      background: var(--red);
      color: #fff;
      box-shadow: 2px 2px 0 #000;
      font: inherit;
      font-size: 10px;
      font-weight: 800;
      padding: 3px 7px;
      cursor: pointer;
      min-width: 48px;
    }
    .codex-card .codex-label {
      font-size: 11px;
      font-weight: 800;
    }

    /* Coming soon list */
    #comingSoonList {
      margin: 4px 12px;
      padding: 8px 10px;
      border: 2px dashed #ccc;
      border-radius: 8px;
      background: #fafafa;
      list-style: none;
      font-size: 11px;
      font-weight: 700;
      color: #888;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    #comingSoonList li::before {
      content: "近日公開 ";
      font-size: 10px;
      font-weight: 800;
      opacity: .6;
    }
    .coming-soon-heading {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .06em;
      color: #aaa;
      text-transform: uppercase;
      padding: 4px 14px 0;
    }
  </style>
</head>
<body>

  <!-- Top red band with Pokéball notch -->
  <div class="top-band" aria-hidden="true">
    <div class="notch"></div>
  </div>

  <!-- ════════════════════ PANELS AREA ════════════════════ -->
  <div class="panels-wrap">

    <!-- ════ あいぼうパネル ════ -->
    <section id="panel-aibou" class="panel">

      <!-- Hero display -->
      <div class="hero-section">
        <div class="hero-sprite-wrap">
          <div id="heroSprite" aria-label="相棒スプライト"></div>
        </div>
        <div class="hero-info">
          <span id="heroName">—</span>
          <span id="heroNum">#000</span>
          <div id="heroTypes"></div>
        </div>
        <button id="nicknameEdit" type="button">&#9998; あだ名をつける</button>
      </div>

      <!-- Sliders: 大きさ / 距離 / 速さ -->
      <div class="sliders-section">
        <div class="slider-row">
          <label for="scale">大きさ</label>
          <input id="scale" type="number" min="0.5" max="5.0" step="0.05" inputmode="decimal" />
          <span id="scaleVal" class="readout" aria-live="polite"></span>
        </div>
        <div class="slider-row">
          <label for="offset">距離</label>
          <input id="offset" type="number" min="0" max="100" step="1" inputmode="numeric" />
          <span id="offsetVal" class="readout" aria-live="polite"></span>
        </div>
        <div class="slider-row">
          <label for="lerp">速さ</label>
          <input id="lerp" type="number" min="0.5" max="5.0" step="0.1" inputmode="decimal" />
          <span id="lerpVal" class="readout" aria-live="polite"></span>
        </div>
      </div>

      <!-- Party row (あいぼうタブ) -->
      <p class="section-label">手持ち</p>
      <div id="partyRowAibou" class="party-row"></div>

      <!-- Roam coming-soon pill -->
      <button id="roamSoon" type="button" disabled aria-disabled="true">
        おさんぽ — 近日公開
      </button>

    </section>

    <!-- ════ ボックスパネル ════ -->
    <section id="panel-box" class="panel" hidden>

      <!-- Party row (ボックスタブ常駐) -->
      <div id="partyRowBox" class="party-row"></div>

      <!-- Search -->
      <div class="search-wrap">
        <input id="search" type="text" inputmode="search" autocomplete="off"
               placeholder="名前・タイプ・作品名で検索" aria-label="ポケモン検索" />
      </div>

      <!-- Kind select -->
      <div class="kind-row">
        <label for="kind">種類</label>
        <select id="kind">
          <option value="normal">通常</option>
          <option value="forms">地方フォルム</option>
        </select>
      </div>

      <!-- Generation chips -->
      <div id="genChips" class="gen-chips" role="group" aria-label="世代フィルタ">
        <button type="button" class="gen-chip active" data-gen="all">全</button>
        <button type="button" class="gen-chip" data-gen="1" title="第1世代: 赤・緑 / 青 / ピカチュウ（カントー）" aria-label="第1世代: 赤・緑 / 青 / ピカチュウ（カントー）">赤緑</button>
        <button type="button" class="gen-chip" data-gen="2" title="第2世代: 金・銀 / クリスタル（ジョウト）" aria-label="第2世代: 金・銀 / クリスタル（ジョウト）">金銀</button>
        <button type="button" class="gen-chip" data-gen="3" title="第3世代: ルビー・サファイア / エメラルド（ホウエン）" aria-label="第3世代: ルビー・サファイア / エメラルド（ホウエン）">RS</button>
        <button type="button" class="gen-chip" data-gen="4" title="第4世代: ダイヤモンド・パール / プラチナ（シンオウ）" aria-label="第4世代: ダイヤモンド・パール / プラチナ（シンオウ）">DP</button>
        <button type="button" class="gen-chip" data-gen="5" title="第5世代: ブラック・ホワイト / B2W2（イッシュ）" aria-label="第5世代: ブラック・ホワイト / B2W2（イッシュ）">BW</button>
        <button type="button" class="gen-chip" data-gen="6" title="第6世代: X・Y（カロス）" aria-label="第6世代: X・Y（カロス）">XY</button>
        <button type="button" class="gen-chip" data-gen="7" title="第7世代: サン・ムーン / USUM（アローラ）" aria-label="第7世代: サン・ムーン / USUM（アローラ）">SM</button>
        <button type="button" class="gen-chip" data-gen="8" title="第8世代: ソード・シールド / Legends アルセウス（ガラル/ヒスイ）" aria-label="第8世代: ソード・シールド / Legends アルセウス（ガラル/ヒスイ）">剣盾</button>
        <button type="button" class="gen-chip" data-gen="9" title="第9世代: スカーレット・バイオレット（パルデア）" aria-label="第9世代: スカーレット・バイオレット（パルデア）">SV</button>
      </div>

      <!-- Type chips -->
      <div id="typeChips" class="type-chips" role="group" aria-label="タイプフィルタ"></div>

      <!-- Pokémon grid -->
      <div id="grid" class="grid" role="listbox" aria-label="ポケモン一覧"></div>

    </section>

    <!-- ════ せっていパネル ════ -->
    <section id="panel-settings" class="panel" hidden>

      <!-- 表示する toggle -->
      <div class="setting-row">
        <input id="enabled" type="checkbox" />
        <label for="enabled">表示する</label>
      </div>

      <!-- 通知コンパニオン -->
      <div class="companion-card">
        <label for="notificationCompanion">
          <input id="notificationCompanion" type="checkbox" />
          <span>通知コンパニオン</span>
        </label>
        <button id="testCompanion" type="button">TEST</button>
      </div>

      <!-- Codex pet -->
      <div class="codex-card">
        <span class="codex-label">Codex pet</span>
        <button id="exportCodexPet" type="button" aria-label="Codex pet をエクスポート">EXPORT</button>
      </div>

      <!-- Coming soon list -->
      <p class="coming-soon-heading">近日公開</p>
      <ul id="comingSoonList">
        <li>おさんぽ — マップ上を自由に歩き回る</li>
        <li>せいかく — 行動パターンをカスタマイズ</li>
        <li>作業見守り — ポモドーロタイマーと連動</li>
        <li>はじっこで休む — 画面端でのんびりする</li>
        <li>カーソルをよける — マウスを避けながら動く</li>
        <li>アプリに合わせる — 起動中のアプリに反応する</li>
      </ul>

    </section>

  </div><!-- /panels-wrap -->

  <!-- ════════════════════ BOTTOM TAB BAR ════════════════════ -->
  <nav id="tabs" role="tablist" aria-label="設定タブ">
