<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src 'self' app: data:; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'" />
  <title>PokéFollower</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    /* Card sizing + paddings (wider so SPEED fits comfortably) */
    :root {
      --announce-h: 0px;
      --announce-side-pad: 14px;
    }
    html { height: 100%; }
    body {
      margin: 0;
      padding-top: calc(64px + var(--announce-h)); /* give space below top band/notch */
      padding-bottom: 60px;      /* give space above bottom band text */
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      font-size: 14px;
      position: relative;
      background: #fff;
      color: #000;
    }

    /* Top red band with black line */
    body::before {
      content: "";
      position: absolute; left: 0; right: 0; top: var(--announce-h);
      height: 28px;
      background: #EF4036;
      border-bottom: 6px solid #000;
    }
    /* Bottom red band with black line */
    body::after {
      content: "";
      position: absolute; left: 0; right: 0; bottom: 0;
      height: 36px;
      background: #EF4036;
      border-top: 5px solid #000;
      z-index: 0;
    }

    .announce {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      min-height: var(--announce-h);
      display: flex;
      align-items: center;
      justify-content: center;
      background: #171717;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.01em;
      text-align: center;
      z-index: 3;
      padding: 3px var(--announce-side-pad);
      box-sizing: border-box;
      white-space: normal;
      line-height: 1.2;
    }

    /* Half Pokéball notch (outer + inner ring) */
    .notch {
      position: absolute; top: calc(6px + var(--announce-h)); left: 50%;
      transform: translateX(-50%);
      width: 27px; height: 27px;
      background: #fff;
      border: 10px solid #000; border-radius: 50%;
      box-sizing: content-box;
    }
    .notch::after {
      content: ""; position: absolute;
      width: 20px; height: 21px;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      background: #fff; border: 1px solid #000; border-radius: 50%;
    }

    /* Header row: brand left, enable toggle right */
    .header {
      position: relative;
      height: 26px;
      display: grid; grid-template-columns: 1fr auto; align-items: center;
      margin-top: -25px;         /* visually closer to black line */
      padding: 0 14px;           /* spacing from edges */
      background: transparent; border: 0;
    }
    .brand { 
      font-weight: 600; font-style: normal; font-size: 12px; letter-spacing: .05em;
    }
    .enable {
      font-weight: 600; font-size: 12px;
      display: inline-grid; grid-auto-flow: column; align-items: center; gap: 6px;
    }

    /* Turn the checkbox into the Pokéball toggle */
    #enabled {
      appearance: none; -webkit-appearance: none;
      width: 36px; height: 18px;
      border: 1.5px solid #000; border-radius: 18px;
      background: #fff; position: relative; display: inline-block; cursor: pointer; outline: none;
    }
    /* switch knob (mini Pokéball) */
    #enabled::after {
      content: "";
      position: absolute; top: 50%; left: -4px; transform: translateY(-50%);
      width: 18px; height: 18px; border-radius: 50%;
      border: 2px solid #000; background: linear-gradient(to bottom, #EF4036 50%, #fff 50%);
    }
    /* ON state */
    #enabled:checked { background: #EF4036; }
    #enabled:checked::after { left: calc(100% - 18px); }
    /* Card body */
    .card {
      padding: 8px 14px 0;
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      min-height: 0;
      gap: 6px;
      position: relative;
      z-index: 1;
    }

    /* Controls layout: three columns */
    .triples {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      text-align: center;
      flex: 0 0 auto;
      margin-top: 0;
    }
    .triple h4 { font-size: 11px; letter-spacing: .02em; margin: 5px 0 6px; font-weight: 800; }

    /* Row: vertical arrows + underline input */
    .controlRow { display: flex; align-items: flex-start; justify-content: center; gap: 10px; }
    .arrowStack { display: flex; flex-direction: column; align-items: center; line-height: 0; }
    .arrowStack .caret { width: 0; height: 0; border: 7px solid transparent; }
    .arrowStack .caret.up   { border-bottom-color: #000; margin-bottom: 1px; } /* ▲ */
    .arrowStack .caret.down { border-top-color:     #000; }                   /* ▼ */

    .inputWrap { display: inline-flex; align-items: flex-start; gap: 6px; margin-top: -1px; }
    .inputWrap input[type="number"] {
      width: 28px; text-align: center; border: 0; border-bottom: 2px solid #000; outline: none;
      font-size: 14px; font-weight: 600; padding: 2px 0 0; background: transparent;
    }
    .inputWrap .suffix { font-weight: 700; display: inline-block; margin-top: 7px; }

    .inputWrap input[type="number"]::-webkit-outer-spin-button,
    .inputWrap input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

    /* Bottom hint text over red band */
    .hint {
      position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%);
      color: #fff; font-weight: 600; margin: 0; font-size: 10px; text-align: center;
      z-index: 2; pointer-events: auto; white-space: normal; font-style: italic;
      width: calc(100% - 12px); line-height: 1.6;
    }
    .hint-credits {
      opacity: 0.55;
    }
    .hint a {
      color: inherit;
    }
    .hint-links {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      width: fit-content;
      margin: 0 auto;
      opacity: 0.95;
    }

    /* Accessibility helper */
    .sr-only {
      position: absolute !important; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0, 0, 1px, 1px); white-space: nowrap; border: 0;
    }

    .search { margin: 0 12px; flex: 0 0 auto; }
    .search input {
      width: 100%; box-sizing: border-box; padding: 7px 10px;
      border: 1.5px solid #000; border-radius: 8px; font-size: 13px; font-weight: 600; outline: none;
    }
    .gen-chips { margin: 0 14px 6px; display: flex; gap: 3px; }
    .gen-chip {
      flex: 1 1 0; min-width: 0; padding: 3px 0; border: 1px solid #ccc; border-radius: 6px;
      font-size: 11px; font-weight: 700; background: #fff; color: #444; cursor: pointer; outline: none;
    }
    .gen-chip:hover { background: #f5f5f5; }
    .gen-chip.active { background: #EF4036; color: #fff; border-color: #EF4036; }
    .grid {
      margin: 0 12px; padding: 4px; flex: 1 1 280px; min-height: 160px; overflow-y: auto;
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; align-content: start;
      border: 1.5px solid #000; border-radius: 8px; background: #fafafa;
    }
    .tile {
      display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
      gap: 2px; padding: 6px 2px; border: 2px solid transparent; border-radius: 8px;
      background: #fff; cursor: pointer; font: inherit; text-align: center;
    }
    .tile:hover { background: #f0f0f0; }
    .tile.selected { border-color: #EF4036; background: #fff4f3; }
    .tile.favorite::after {
      content: "★";
      position: absolute;
      top: 2px;
      right: 4px;
      color: #EF4036;
      font-size: 10px;
      font-weight: 900;
    }
    .tile {
      position: relative;
    }
    .tile img { width: 48px; height: 48px; image-rendering: pixelated; object-fit: contain; }
    .tile .name { font-size: 11px; font-weight: 700; line-height: 1.1; word-break: break-all; }
    .tile .num { font-size: 10px; color: #888; }
    .tile.hidden { display: none; }
    .behaviors {
      margin: 7px 14px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .behavior select {
      border: 1.5px solid #000;
      border-radius: 6px;
      background: #fff;
      color: #000;
      font: inherit;
      font-size: 11px;
      font-weight: 800;
      padding: 2px 4px;
      max-width: 76px;
    }
    .behavior {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 700;
    }
    .select-row {
      margin: 7px 14px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 700;
    }
    .select-row select {
      border: 1.5px solid #000;
      border-radius: 6px;
      background: #fff;
      color: #000;
      font: inherit;
      font-weight: 700;
      padding: 3px 6px;
    }
    #edgeRest, #avoidCursor, #appReactions {
      width: 16px;
      height: 16px;
      accent-color: #EF4036;
    }
    .companion {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      margin: 0 12px;
      padding: 5px 8px;
      border: 2px solid #000;
      background: #fff;
      box-shadow: 2px 2px 0 #000;
      box-sizing: border-box;
      flex: 0 0 auto;
    }
    .companion label {
      display: inline-grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      font-weight: 800;
      min-width: 0;
    }
    .companion input {
      width: 16px;
      height: 16px;
      accent-color: #EF4036;
    }
    .companion button {
      border: 2px solid #000;
      background: #EF4036;
      color: #fff;
      box-shadow: 2px 2px 0 #000;
      font: inherit;
      font-size: 10px;
      font-weight: 800;
      padding: 3px 7px;
      cursor: pointer;
      min-width: 48px;
    }
    .workwatch {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px;
      margin: 0 12px;
      align-items: center;
      font-size: 11px;
      font-weight: 800;
    }
    .team {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px;
      margin: 0 12px;
      align-items: center;
      font-size: 11px;
      font-weight: 800;
    }
    .team-main {
      display: inline-grid;
      grid-template-columns: auto auto auto;
      gap: 5px;
      align-items: center;
      min-width: 0;
    }
    .team-actions {
      display: inline-flex;
      gap: 4px;
    }
    .team button {
      border: 1.5px solid #000;
      background: #fff;
      color: #000;
      font: inherit;
      font-size: 10px;
      font-weight: 800;
      padding: 2px 5px;
      cursor: pointer;
    }
    .team input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #EF4036;
    }
    .team input[type="number"] {
      width: 34px;
      border: 0;
      border-bottom: 1.5px solid #000;
      font: inherit;
      font-size: 11px;
      font-weight: 800;
      text-align: center;
      background: transparent;
    }
    .workwatch-main {
      display: inline-grid;
      grid-template-columns: auto auto 1fr;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }
    .workwatch select {
      border: 1.5px solid #000;
      border-radius: 6px;
      background: #fff;
      color: #000;
      font: inherit;
      font-weight: 800;
      padding: 2px 4px;
      min-width: 60px;
    }
    .workwatch-actions {
      display: inline-flex;
      gap: 4px;
    }
    .workwatch button {
      border: 1.5px solid #000;
      background: #fff;
      color: #000;
      font: inherit;
      font-size: 10px;
      font-weight: 800;
      padding: 2px 5px;
      cursor: pointer;
    }
    #workWatch {
      width: 16px;
      height: 16px;
      accent-color: #EF4036;
    }
  </style>
</head>
<body>
  <!-- Pokéball notch -->
  <div class="notch" aria-hidden="true"></div>

  <!-- Header -->
  <div class="header">
    <div class="brand">PokéFollower</div>
    <label class="enable" for="enabled">
      <span>Enable Follower</span>
      <input id="enabled" type="checkbox" />
    </label>
  </div>

  <div class="card">
    <div class="search">
      <input id="search" type="text" inputmode="search" autocomplete="off" placeholder="名前・ローマ字・番号で検索" aria-label="ポケモン検索" />
    </div>
    <div id="genChips" class="gen-chips" role="group" aria-label="世代フィルタ">
      <button type="button" class="gen-chip active" data-gen="all">全</button>
      <button type="button" class="gen-chip" data-gen="1">1</button>
      <button type="button" class="gen-chip" data-gen="2">2</button>
      <button type="button" class="gen-chip" data-gen="3">3</button>
      <button type="button" class="gen-chip" data-gen="4">4</button>
      <button type="button" class="gen-chip" data-gen="5">5</button>
      <button type="button" class="gen-chip" data-gen="6">6</button>
      <button type="button" class="gen-chip" data-gen="7">7</button>
      <button type="button" class="gen-chip" data-gen="8">8</button>
      <button type="button" class="gen-chip" data-gen="9">9</button>
    </div>
    <div class="companion">
      <label for="notificationCompanion">
        <input id="notificationCompanion" type="checkbox" />
        <span>通知コンパニオン</span>
      </label>
      <button id="testCompanion" type="button">TEST</button>
    </div>
    <div class="workwatch">
      <label class="workwatch-main" for="workWatch">
        <input id="workWatch" type="checkbox" />
        <span>作業見守り</span>
        <select id="workWatchPreset" aria-label="作業見守りプリセット">
          <option value="25/5">25/5</option>
          <option value="50/10">50/10</option>
        </select>
      </label>
      <div class="workwatch-actions">
        <button id="workWatchStart" type="button">START</button>
        <button id="workWatchStop" type="button">STOP</button>
        <button id="workWatchReset" type="button">RESET</button>
      </div>
    </div>
    <div class="team">
      <label class="team-main" for="rotationEnabled">
        <input id="rotationEnabled" type="checkbox" />
        <span>待機列 <span id="favoriteCount">0</span></span>
        <input id="rotationInterval" type="number" min="1" max="120" step="1" aria-label="交代間隔（分）" />
      </label>
      <div class="team-actions">
        <button id="favoriteAdd" type="button">ADD</button>
        <button id="favoriteNext" type="button">NEXT</button>
        <button id="favoriteClear" type="button">CLR</button>
      </div>
    </div>
    <div id="grid" class="grid" role="listbox" aria-label="ポケモン一覧"></div>
    <div class="behaviors">
      <label class="behavior" for="edgeRest">
        <input id="edgeRest" type="checkbox" />
        <span>Edge Rest</span>
      </label>
      <label class="behavior" for="avoidCursor">
        <input id="avoidCursor" type="checkbox" />
        <span>Avoid Cursor</span>
      </label>
      <label class="behavior" for="avoidCursorStrength">
        <span>Avoid</span>
        <select id="avoidCursorStrength" aria-label="カーソル退避強度">
          <option value="normal">Normal</option>
          <option value="strong">Strong</option>
        </select>
      </label>
      <label class="behavior" for="appReactions">
        <input id="appReactions" type="checkbox" />
        <span>App React</span>
      </label>
    </div>
    <label class="select-row" for="mode">
      <span>Mode</span>
      <select id="mode">
        <option value="follow">Follow</option>
        <option value="roam">Roam</option>
      </select>
    </label>
    <label class="select-row" for="personality">
      <span>Personality</span>
      <select id="personality">
        <option value="standard">Standard</option>
        <option value="active">Active</option>
        <option value="relaxed">Relaxed</option>
        <option value="friendly">Friendly</option>
      </select>
    </label>

    <!-- Triple controls -->
    <div class="triples">
      <div class="triple">
        <h4>SCALE</h4>
        <div class="controlRow">
          <div class="arrowStack" aria-hidden="true">
            <div class="caret up"></div>
            <div class="caret down"></div>
          </div>
          <div class="inputWrap">
            <input id="scale" type="number" min="0.5" max="5.0" step="0.05" inputmode="decimal" />
            <span class="suffix">x</span>
          </div>
        </div>
        <span id="scaleVal" class="sr-only" aria-live="polite"></span>
      </div>

      <div class="triple">
        <h4>DISTANCE</h4>
        <div class="controlRow">
          <div class="arrowStack" aria-hidden="true">
            <div class="caret up"></div>
            <div class="caret down"></div>
          </div>
          <div class="inputWrap">
            <input id="offset" type="number" min="0" max="100" step="1" inputmode="numeric" />
            <span class="suffix">px</span>
          </div>
        </div>
        <span id="offsetVal" class="sr-only" aria-live="polite"></span>
      </div>

      <div class="triple">
        <h4>SPEED</h4>
        <div class="controlRow">
          <div class="arrowStack" aria-hidden="true">
            <div class="caret up"></div>
            <div class="caret down"></div>
          </div>
          <div class="inputWrap">
            <input id="lerp" type="number" min="0.5" max="5.0" step="0.1" inputmode="decimal" />
            <span class="suffix">spd</span>
          </div>
        </div>
        <span id="lerpVal" class="sr-only" aria-live="polite"></span>
      </div>
    </div>

    <!-- Bottom credit (sprite attribution only) -->
    <p class="hint hint-credits">ドット絵素材: PMD Collab / Pokémon DB</p>
  </div>

  <script src="settings.js"></script>
</body>
</html>
